<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>de Broglie | PhysIQ Lab v2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <!-- I built this page to stay clean, readable, and useful for physics students. — Tejas Kamble -->
</head>
<body data-page="debroglie" data-base="../">
  <div id="site-nav"></div>
  
<main class="py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="feature-card p-4 p-md-5 h-100">
          <span class="badge-soft mb-3">Matter waves</span>
          <h1 class="h2 fw-bold mb-3">de Broglie Velocity Calculator</h1>
          <p class="small-muted mb-4">
            Compare phase velocity and group velocity from one clean input. The chart shows how the two evolve with particle speed.
          </p>

          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label" for="dbV">Particle velocity v (m/s)</label>
              <input class="form-control" id="dbV" type="number" step="any" placeholder="2000000">
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button class="btn btn-accent w-100" type="button" onclick="calculateDebroglie()">Calculate</button>
            </div>
          </div>

          <div class="row g-3 mt-2">
            <div class="col-md-6">
              <div class="output-box">
                <div class="small-muted">Phase velocity</div>
                <div id="dbVpResult" class="fs-5">—</div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="output-box">
                <div class="small-muted">Group velocity</div>
                <div id="dbVgResult" class="fs-5">—</div>
              </div>
            </div>
          </div>

          <div class="output-box mt-3" id="dbExplain">—</div>

          <div class="math-box p-3 mt-4">
            <div class="fw-semibold mb-1">Relations used</div>
            <div class="small-muted">v<sub>p</sub> = c² / v</div>
            <div class="small-muted">v<sub>g</sub> = v</div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="feature-card p-4 h-100">
          <h2 class="h4 fw-bold mb-3">Velocity comparison</h2>
          <div class="chart-wrap">
            <div class="chart-box">
              <canvas id="dbChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
  
</body>
</html>
